<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 3: Card-based M3 | MedBridge AI Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* M3 tonal surfaces, elevated cards, strong containment */
    :root {
      --primary: #F5B800;
      --primary-container: #FFF8E1;
      --on-primary: #1a1a1a;
      --on-primary-container: #3d3520;
      --surface: #FAFAF9;
      --surface-container: #F5F3EF;
      --surface-container-high: #FFFBF5;
      --outline: #D4CFC4;
      --outline-variant: #E8E4DC;
      --text: #1c1b1f;
      --text-muted: #6b675e;
      --user-bubble: #1a1a1a;
      --coach-bubble: #FFFBF5;
      --radius-lg: 1.75rem;
      --radius-md: 1rem;
      --radius-sm: 0.75rem;
      --elevation: 0 2px 6px rgba(0,0,0,0.06);
      --elevation-2: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }
    .container { max-width: 500px; width: 100%; display: flex; flex-direction: column; height: 90vh; max-height: 700px; gap: 1rem; }
    .card {
      background: white; border-radius: var(--radius-lg);
      box-shadow: var(--elevation); border: 1px solid var(--outline-variant);
      overflow: hidden;
    }
    header {
      padding: 1.5rem 1.25rem;
      background: var(--primary-container);
      display: flex; align-items: center; gap: 1rem;
    }
    .logo img { height: 40px; width: auto; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    .patient-card {
      padding: 1rem 1.25rem;
      display: flex; gap: 0.5rem; align-items: center;
    }
    .patient-card input {
      flex: 1; padding: 0.7rem 1rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }
    .load-btn {
      padding: 0.7rem 1rem; font-size: 0.9rem;
      background: var(--primary); color: var(--on-primary);
      border: none; border-radius: var(--radius-sm);
      font-weight: 600; cursor: pointer;
    }
    .chat-card {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .status-bar {
      display: flex; gap: 0.75rem; padding: 0.75rem 1.25rem;
      font-size: 0.8rem; color: var(--text-muted);
      background: var(--surface-container-high); border-bottom: 1px solid var(--outline-variant);
    }
    .badge {
      padding: 0.25rem 0.6rem; border-radius: 999px;
      background: var(--primary-container); color: var(--on-primary-container);
      font-weight: 600;
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 1rem 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg {
      max-width: 78%; padding: 1rem 1.2rem;
      border-radius: var(--radius-md); font-size: 0.95rem; line-height: 1.5;
      box-shadow: var(--elevation);
    }
    .msg.user {
      align-self: flex-end; background: var(--user-bubble); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.coach {
      align-self: flex-start; background: var(--coach-bubble);
      border: 1px solid var(--outline-variant); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .input-card {
      padding: 1rem 1.25rem;
      display: flex; gap: 0.5rem;
    }
    .input-card input {
      flex: 1; padding: 0.85rem 1.2rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.95rem;
    }
    .input-card button {
      padding: 0.85rem 1.3rem; background: var(--primary);
      color: var(--on-primary); border: none; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 0.95rem; cursor: pointer;
    }
    .mockup-label {
      position: fixed; top: 0.5rem; right: 0.5rem;
      background: var(--primary); color: var(--on-primary);
      padding: 0.35rem 0.75rem; border-radius: 0.5rem;
      font-size: 0.75rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <span class="mockup-label">Mockup 3: Card-based M3</span>
  <div class="container">
    <div class="card">
      <header>
        <div class="logo"><img src="assets/logo-black.png" alt="MedBridge" /></div>
        <div>
          <h1>AI Health Coach</h1>
          <p>Your accountability partner for home exercises</p>
        </div>
      </header>
      <div class="patient-card">
        <input type="text" placeholder="Patient ID" value="patient-069">
        <button class="load-btn">Load</button>
      </div>
    </div>
    <div class="card chat-card">
      <div class="status-bar">
        <span class="badge">Active</span>
        <span>Goal: Walk 15 min, 3×/week</span>
      </div>
      <div class="chat">
        <div class="msg coach">Hi! I'm your AI coach. How are you feeling today?</div>
        <div class="msg user">Doing okay, a bit sore from yesterday's stretches.</div>
        <div class="msg coach">That's normal. Let's keep it light. Did you do your morning walk?</div>
      </div>
      <div class="input-card">
        <input type="text" placeholder="Type your message..." />
        <button>Send</button>
      </div>
    </div>
  </div>
</body>
</html>
