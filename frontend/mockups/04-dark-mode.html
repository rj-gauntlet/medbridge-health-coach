<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 4: Dark Mode | MedBridge AI Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Dark surfaces + MedBridge yellow accent. Modern, sleek */
    :root {
      --primary: #F5B800;
      --primary-dim: #C99400;
      --surface: #1a1a1a;
      --surface-container: #252525;
      --surface-container-high: #2e2e2e;
      --outline: #404040;
      --outline-variant: #333;
      --text: #f5f5f5;
      --text-muted: #a3a3a3;
      --user-bubble: #F5B800;
      --coach-bubble: #2e2e2e;
      --radius: 1rem;
      --radius-sm: 0.625rem;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #121212;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }
    .container { max-width: 480px; width: 100%; display: flex; flex-direction: column; height: 90vh; max-height: 680px; background: var(--surface); border-radius: 1.25rem; border: 1px solid var(--outline); overflow: hidden; }
    header {
      padding: 1.5rem 1.25rem;
      border-bottom: 1px solid var(--outline);
      display: flex; align-items: center; gap: 1rem;
    }
    .logo img { height: 40px; width: auto; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    .patient-row {
      display: flex; gap: 0.5rem; padding: 0.75rem 1.25rem;
      background: var(--surface-container);
    }
    .patient-row input {
      flex: 1; padding: 0.7rem 1rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.9rem; background: var(--surface-container-high);
      color: var(--text);
    }
    .patient-row input::placeholder { color: var(--text-muted); }
    .load-btn {
      padding: 0.7rem 1rem; font-size: 0.9rem;
      background: var(--surface-container-high); color: var(--text);
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-weight: 500; cursor: pointer;
    }
    .load-btn:hover { border-color: var(--primary); color: var(--primary); }
    .status-bar {
      display: flex; gap: 0.75rem; padding: 0.6rem 1.25rem;
      font-size: 0.8rem; color: var(--text-muted);
      border-bottom: 1px solid var(--outline);
    }
    .badge {
      padding: 0.25rem 0.6rem; border-radius: 999px;
      background: rgba(245,184,0,0.2); color: var(--primary);
      font-weight: 600;
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 1rem 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg {
      max-width: 80%; padding: 1rem 1.2rem;
      border-radius: var(--radius); font-size: 0.95rem; line-height: 1.5;
    }
    .msg.user {
      align-self: flex-end; background: var(--user-bubble); color: #1a1a1a;
      border-bottom-right-radius: 4px;
    }
    .msg.coach {
      align-self: flex-start; background: var(--coach-bubble);
      border: 1px solid var(--outline); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; gap: 0.5rem; padding: 1rem 1.25rem;
      border-top: 1px solid var(--outline);
    }
    .input-area input {
      flex: 1; padding: 0.85rem 1.2rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.95rem; background: var(--surface-container-high);
      color: var(--text);
    }
    .input-area input::placeholder { color: var(--text-muted); }
    .input-area input:focus { outline: none; border-color: var(--primary); }
    .input-area button {
      padding: 0.85rem 1.3rem; background: var(--primary);
      color: #1a1a1a; border: none; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 0.95rem; cursor: pointer;
    }
    .mockup-label {
      position: fixed; top: 0.5rem; right: 0.5rem;
      background: var(--primary); color: #1a1a1a;
      padding: 0.35rem 0.75rem; border-radius: 0.5rem;
      font-size: 0.75rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <span class="mockup-label">Mockup 4: Dark Mode</span>
  <div class="container">
    <header>
      <div class="logo"><img src="assets/logo-white.png" alt="MedBridge" /></div>
      <div>
        <h1>AI Health Coach</h1>
        <p>Your accountability partner for home exercises</p>
      </div>
    </header>
    <div class="patient-row">
      <input type="text" placeholder="Patient ID" value="patient-069">
      <button class="load-btn">Load</button>
    </div>
    <div class="status-bar">
      <span class="badge">Active</span>
      <span>Goal: Walk 15 min, 3×/week</span>
    </div>
    <div class="chat">
      <div class="msg coach">Hi! I'm your AI coach. How are you feeling today?</div>
      <div class="msg user">Doing okay, a bit sore from yesterday's stretches.</div>
      <div class="msg coach">That's normal. Let's keep it light today. Did you do your morning walk?</div>
    </div>
    <div class="input-area">
      <input type="text" placeholder="Type your message..." />
      <button>Send</button>
    </div>
  </div>
</body>
</html>
