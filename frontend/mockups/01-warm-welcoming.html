<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 1: Warm & Welcoming | MedBridge AI Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    /* MedBridge: yellow arches + black. Warm, inviting, M3 expressive */
    :root {
      --primary: #F5B800;
      --primary-container: #FFF3C4;
      --on-primary: #1a1a1a;
      --surface: #FFFDF7;
      --surface-container: #FFF8E7;
      --outline: #E5D9B8;
      --outline-variant: #F0E6D0;
      --text: #1a1a1a;
      --text-muted: #5c5c5c;
      --user-bubble: #1a1a1a;
      --coach-bubble: #FFF8E7;
      --radius: 1.25rem;
      --radius-sm: 0.75rem;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }
    .container { max-width: 480px; width: 100%; display: flex; flex-direction: column; height: 90vh; max-height: 680px; }
    header {
      text-align: center;
      padding: 1.5rem 0;
      border-bottom: 2px solid var(--outline-variant);
    }
    .logo img {
      height: 40px; width: auto; display: block; margin: 0 auto 0.75rem;
    }
    header h1 { font-size: 1.35rem; font-weight: 700; color: var(--text); }
    header p { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.35rem; }
    .patient-row {
      display: flex; gap: 0.5rem; align-items: center;
      padding: 0.75rem 0; margin-bottom: 0.5rem;
    }
    .patient-row input {
      flex: 1; padding: 0.65rem 1rem;
      border: 2px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.9rem; background: white;
    }
    .load-btn {
      padding: 0.65rem 1rem; font-size: 0.85rem;
      background: var(--primary-container); color: var(--on-primary);
      border: 2px solid var(--primary); border-radius: var(--radius-sm);
      font-weight: 600; cursor: pointer;
    }
    .status-bar {
      display: flex; gap: 0.75rem; padding: 0.5rem 0;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .badge {
      padding: 0.3rem 0.6rem; border-radius: 999px;
      font-weight: 600; background: var(--primary-container); color: var(--on-primary);
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 1rem 0;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg {
      max-width: 82%; padding: 1rem 1.2rem;
      border-radius: var(--radius); font-size: 0.95rem; line-height: 1.5;
    }
    .msg.user {
      align-self: flex-end; background: var(--user-bubble); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.coach {
      align-self: flex-start; background: var(--coach-bubble);
      border: 2px solid var(--outline-variant); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; gap: 0.5rem; padding: 1rem 0;
      border-top: 2px solid var(--outline-variant);
    }
    .input-area input {
      flex: 1; padding: 0.85rem 1.2rem;
      border: 2px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.95rem; background: white;
    }
    .input-area button {
      padding: 0.85rem 1.4rem; background: var(--primary);
      color: var(--on-primary); border: none; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 0.95rem; cursor: pointer;
    }
    .mockup-label {
      position: fixed; top: 0.5rem; right: 0.5rem;
      background: var(--primary); color: var(--on-primary);
      padding: 0.35rem 0.75rem; border-radius: 0.5rem;
      font-size: 0.75rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <span class="mockup-label">Mockup 1: Warm & Welcoming</span>
  <div class="container">
    <header>
      <div class="logo"><img src="assets/logo-black.png" alt="MedBridge" /></div>
      <h1>AI Health Coach</h1>
      <p>Your accountability partner for home exercises</p>
    </header>
    <div class="patient-row">
      <label for="pid" style="font-size:0.8rem;color:var(--text-muted)">Patient ID</label>
      <input type="text" id="pid" placeholder="patient-001" value="patient-069">
      <button class="load-btn">Load</button>
    </div>
    <div class="status-bar">
      <span class="badge">Active</span>
      <span>Goal: Walk 15 min, 3×/week</span>
    </div>
    <div class="chat">
      <div class="msg coach">Hi! I'm your AI coach. How are you feeling today?</div>
      <div class="msg user">Doing okay, a bit sore from yesterday's stretches.</div>
      <div class="msg coach">That's normal. Let's keep it light today. Did you do your morning walk?</div>
    </div>
    <div class="input-area">
      <input type="text" placeholder="Type your message..." />
      <button>Send</button>
    </div>
  </div>
</body>
</html>
