<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 5: Soft & Calm | MedBridge AI Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Muted healthcare palette. Calm, approachable. Yellow as subtle accent */
    :root {
      --primary: #B8A060;
      --primary-soft: #E8E2D0;
      --primary-container: #F5F2E8;
      --surface: #FAF9F6;
      --surface-container: #F0EDE6;
      --outline: #D9D4C8;
      --text: #3d3a35;
      --text-muted: #7a756c;
      --user-bubble: #5c574d;
      --coach-bubble: #FFFFFF;
      --accent-warm: #D4B896;
      --radius: 1.125rem;
      --radius-sm: 0.875rem;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }
    .container { max-width: 500px; width: 100%; display: flex; flex-direction: column; height: 90vh; max-height: 700px; background: white; border-radius: 1.5rem; box-shadow: 0 4px 24px rgba(61,58,53,0.06); overflow: hidden; border: 1px solid var(--outline); }
    header {
      text-align: center; padding: 1.75rem 1.5rem;
      background: linear-gradient(180deg, var(--primary-container) 0%, white 100%);
      border-bottom: 1px solid var(--outline);
    }
    .logo {
      margin: 0 auto 0.75rem;
      text-align: center;
    }
    .logo img { height: 44px; width: auto; }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    header p { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.3rem; }
    .patient-row {
      display: flex; gap: 0.5rem; padding: 1rem 1.25rem;
      background: var(--surface-container);
    }
    .patient-row input {
      flex: 1; padding: 0.75rem 1.1rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.95rem; background: white;
    }
    .load-btn {
      padding: 0.75rem 1.1rem; font-size: 0.9rem;
      background: var(--primary-soft); color: var(--text);
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-weight: 600; cursor: pointer;
    }
    .status-bar {
      display: flex; gap: 0.75rem; padding: 0.65rem 1.25rem;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .badge {
      padding: 0.3rem 0.65rem; border-radius: 999px;
      background: var(--primary-container); color: var(--primary);
      font-weight: 600;
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 1.25rem 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg {
      max-width: 82%; padding: 1rem 1.25rem;
      border-radius: var(--radius); font-size: 0.95rem; line-height: 1.55;
    }
    .msg.user {
      align-self: flex-end; background: var(--user-bubble); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.coach {
      align-self: flex-start; background: var(--coach-bubble);
      border: 1px solid var(--outline); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; gap: 0.5rem; padding: 1rem 1.25rem;
      border-top: 1px solid var(--outline);
      background: var(--surface-container);
    }
    .input-area input {
      flex: 1; padding: 0.85rem 1.2rem;
      border: 1px solid var(--outline); border-radius: var(--radius-sm);
      font-size: 0.95rem; background: white;
    }
    .input-area button {
      padding: 0.85rem 1.35rem; background: var(--primary);
      color: white; border: none; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 0.95rem; cursor: pointer;
    }
    .mockup-label {
      position: fixed; top: 0.5rem; right: 0.5rem;
      background: var(--primary-container); color: var(--text);
      padding: 0.35rem 0.75rem; border-radius: 0.5rem;
      font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--outline);
    }
  </style>
</head>
<body>
  <span class="mockup-label">Mockup 5: Soft & Calm</span>
  <div class="container">
    <header>
      <div class="logo"><img src="assets/logo-black.png" alt="MedBridge" /></div>
      <h1>AI Health Coach</h1>
      <p>Your accountability partner for home exercises</p>
    </header>
    <div class="patient-row">
      <input type="text" placeholder="Patient ID" value="patient-069">
      <button class="load-btn">Load</button>
    </div>
    <div class="status-bar">
      <span class="badge">Active</span>
      <span>Goal: Walk 15 min, 3×/week</span>
    </div>
    <div class="chat">
      <div class="msg coach">Hi! I'm your AI coach. How are you feeling today?</div>
      <div class="msg user">Doing okay, a bit sore from yesterday's stretches.</div>
      <div class="msg coach">That's normal. Let's keep it light today. Did you do your morning walk?</div>
    </div>
    <div class="input-area">
      <input type="text" placeholder="Type your message..." />
      <button>Send</button>
    </div>
  </div>
</body>
</html>
